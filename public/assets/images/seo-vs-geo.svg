<svg class="seo-geo-figure" viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sgTitle sgDesc" width="100%" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="sgTitle">SEO versus GEO</title>
  <desc id="sgDesc">A side by side comparison of two kinds of search, following one business across both. On the left, a traditional search engine (SEO) answers the query "best coffee roaster in Norwich" with a ranked list of links; your business sits low down the list, one of many. On the right, a generative engine (GEO) such as an AI assistant answers the same question with a single written answer and cites one source: your business. A search engine makes you one of ten. A generative engine makes you the answer, or leaves you out entirely.</desc>

  <style>
    .seo-geo-figure{
      --panel:#f5f4f1; --card:#ffffff; --ink:#1b1815; --muted:#8c887f;
      --line:#e4e2dc; --link:#35618e; --accent:#bd7f2e; --accentTint:#f6ead6;
    }
    @media (prefers-color-scheme: dark){
      .seo-geo-figure{
        --panel:#1e1c19; --card:#151311; --ink:#f1eee8; --muted:#9a958c;
        --line:#332f2a; --link:#7fa8d8; --accent:#d59a48; --accentTint:#2a2114;
      }
    }
    .panel{ fill:var(--panel); stroke:var(--line); stroke-width:1; }
    .card{ fill:var(--card); stroke:var(--line); stroke-width:1; }
    .ink{ fill:var(--ink); }
    .muted{ fill:var(--muted); }
    .link{ fill:var(--link); }
    .accent{ fill:var(--accent); }
    .bar{ fill:var(--line); }
    .eyebrow{ fill:var(--muted); font-size:11px; letter-spacing:1.5px; font-weight:600; }
    .h1{ fill:var(--ink); font-size:27px; font-weight:700; letter-spacing:-0.3px; }
    .sub{ fill:var(--muted); font-size:13px; }
    .result{ fill:var(--link); font-size:13px; font-weight:600; }
    .query{ fill:var(--ink); font-size:12px; }
    .caption{ fill:var(--ink); font-size:13.5px; font-weight:500; }
    .thesis{ fill:var(--ink); font-size:15px; font-weight:600; font-style:italic; }
    .tiny{ fill:var(--muted); font-size:11px; }
    .cite{ fill:var(--accent); font-size:11.5px; font-weight:600; }
  </style>

  <!-- Header -->
  <text x="40" y="52" class="h1">SEO vs GEO</text>
  <text x="820" y="52" class="sub" text-anchor="end">same business, two very different outcomes</text>

  <!-- ===================== LEFT PANEL: SEO ===================== -->
  <rect x="40" y="92" width="372" height="304" rx="14" class="panel"/>
  <text x="66" y="124" class="eyebrow">SEARCH ENGINE · SEO</text>

  <!-- search bar -->
  <rect x="66" y="136" width="320" height="36" rx="9" class="card"/>
  <circle cx="86" cy="154" r="6" fill="none" stroke="var(--muted)" stroke-width="1.6"/>
  <line x1="90.5" y1="158.5" x2="95" y2="163" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round"/>
  <text x="104" y="158" class="query">best coffee roaster in norwich</text>

  <!-- result 1 -->
  <text x="66" y="204" class="result">Norwich Coffee Roasting Co.</text>
  <rect x="66" y="212" width="300" height="6" rx="3" class="bar"/>
  <rect x="66" y="223" width="210" height="6" rx="3" class="bar"/>

  <!-- result 2 -->
  <text x="66" y="252" class="result">The Bean Shed, Norfolk roasters</text>
  <rect x="66" y="260" width="300" height="6" rx="3" class="bar"/>
  <rect x="66" y="271" width="190" height="6" rx="3" class="bar"/>

  <!-- result 3 -->
  <text x="66" y="300" class="result">Best coffee in Norwich, 2026 guide</text>
  <rect x="66" y="308" width="300" height="6" rx="3" class="bar"/>
  <rect x="66" y="319" width="230" height="6" rx="3" class="bar"/>

  <!-- result: YOUR SITE, buried -->
  <text x="66" y="348" class="cite" font-size="13">yourbusiness.co.uk</text>
  <rect x="66" y="356" width="170" height="6" rx="3" fill="var(--accent)" opacity="0.28"/>

  <text x="66" y="382" class="tiny">+ 7 more results</text>

  <text x="66" y="428" class="caption">A list of links. You have to be picked.</text>

  <!-- ===================== DIVIDER ===================== -->
  <line x1="430" y1="112" x2="430" y2="384" stroke="var(--line)" stroke-width="1"/>
  <circle cx="430" cy="248" r="19" class="card"/>
  <text x="430" y="252" class="muted" font-size="13" font-style="italic" text-anchor="middle">vs</text>

  <!-- ===================== RIGHT PANEL: GEO ===================== -->
  <rect x="448" y="92" width="372" height="304" rx="14" class="panel"/>
  <text x="474" y="124" class="eyebrow">GENERATIVE ENGINE · GEO</text>

  <!-- prompt bar -->
  <rect x="474" y="136" width="320" height="36" rx="9" class="card"/>
  <text x="490" y="158" class="accent" font-size="13" font-weight="700">›</text>
  <text x="504" y="158" class="query" font-size="11.5">where's the best coffee roaster in norwich?</text>

  <!-- single answer card -->
  <rect x="474" y="192" width="320" height="158" rx="11" class="card"/>
  <text x="492" y="216" class="eyebrow">ANSWER</text>
  <rect x="492" y="228" width="284" height="7" rx="3.5" class="bar"/>
  <rect x="492" y="244" width="284" height="7" rx="3.5" class="bar"/>
  <rect x="492" y="260" width="240" height="7" rx="3.5" class="bar"/>
  <rect x="492" y="276" width="176" height="7" rx="3.5" class="bar"/>

  <line x1="492" y1="300" x2="776" y2="300" stroke="var(--line)" stroke-width="1"/>
  <text x="492" y="330" class="tiny">Source</text>
  <rect x="536" y="317" width="152" height="21" rx="10.5" fill="var(--accentTint)" stroke="var(--accent)" stroke-width="1"/>
  <text x="546" y="331" class="cite">yourbusiness.co.uk</text>

  <text x="474" y="428" class="caption">One answer. You have to be in it.</text>

  <!-- Thesis -->
  <text x="430" y="470" class="thesis" text-anchor="middle">One is a queue. The other is a verdict.</text>
</svg>
