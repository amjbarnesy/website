<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc"><title id="title">Light converging</title><desc id="desc">Expanding wavefronts travel through a spatial cone and converge at a lime point.</desc><style>svg{--i:#F3F3F3;--a:#AAFF00}.ray,.wave{fill:none;stroke:var(--i);stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1}.ray{stroke-width:1.15;animation:r 6s ease-in-out forwards}.wave{stroke-width:1;animation:w 6s ease-in-out forwards}.w2{animation-delay:.14s}.w3{animation-delay:.28s}.w4{animation-delay:.42s}.p{fill:var(--a);transform-box:fill-box;transform-origin:center;animation:p 6s ease-in-out forwards}@keyframes r{0%,6%{opacity:0;stroke-dashoffset:1}16%{opacity:.18}50%,100%{opacity:.18;stroke-dashoffset:0}}@keyframes w{0%,25%{opacity:0;stroke-dashoffset:1;transform:translateX(-10px)}35%{opacity:.2}62%,100%{opacity:.2;stroke-dashoffset:0;transform:none}}@keyframes p{0%,53%{opacity:0;transform:scale(.2)}61%{opacity:1;transform:scale(1)}68%{transform:scale(1.75)}75%,100%{opacity:1;transform:scale(1)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}.ray,.wave{stroke-dashoffset:0;transform:none}.ray{opacity:.18}.wave{opacity:.2}.p{opacity:1}}</style><path class="ray" pathLength="1" d="M250 100L548 210L250 320M250 210H548"/><ellipse class="wave" pathLength="1" cx="286" cy="210" rx="38" ry="110"/><ellipse class="wave w2" pathLength="1" cx="356" cy="210" rx="31" ry="82"/><ellipse class="wave w3" pathLength="1" cx="424" cy="210" rx="23" ry="55"/><ellipse class="wave w4" pathLength="1" cx="490" cy="210" rx="14" ry="29"/><circle class="p" cx="548" cy="210" r="5"/></svg>
